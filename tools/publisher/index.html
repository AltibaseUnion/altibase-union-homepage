<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Union Publisher Lite</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Altibase Union</p>
        <h1>Union Publisher Lite</h1>
        <p>Notion Markdown 또는 ZIP을 활동보고 초안으로 변환하고 검증합니다.</p>
      </div>
      <span class="status">Local only</span>
    </header>

    <main class="app-shell">
      <section class="panel upload-panel">
        <h2>1. 원문 업로드</h2>
        <form id="uploadForm">
          <label class="file-box">
            <span>Markdown 또는 Notion ZIP 선택</span>
            <input id="fileInput" name="file" type="file" accept=".md,.markdown,.zip" required />
          </label>
          <label>
            원문 URL
            <input id="sourceUrl" name="sourceUrl" type="url" placeholder="https://notion.so/..." />
          </label>
          <button type="submit">분석 및 변환</button>
        </form>
      </section>

      <section class="panel">
        <h2>2. 자동 제안</h2>
        <div id="metadata" class="metadata empty">업로드 후 제목, 날짜, 요약, 태그가 표시됩니다.</div>
      </section>

      <section class="panel wide">
        <div class="panel-heading">
          <h2>3. 원문 / 변환본 비교</h2>
          <div class="actions">
            <button id="validateButton" type="button" disabled>검증</button>
            <button id="writeButton" type="button" disabled>활동보고 생성</button>
          </div>
        </div>
        <div class="compare-grid">
          <label>
            원문
            <textarea id="sourceText" readonly></textarea>
          </label>
          <label>
            변환본
            <textarea id="convertedText"></textarea>
          </label>
        </div>
      </section>

      <section class="panel">
        <h2>4. 검증 결과</h2>
        <ul id="issues" class="issues">
          <li class="muted">아직 검증 전입니다.</li>
        </ul>
      </section>

      <section class="panel">
        <h2>5. 확인 및 게시 준비</h2>
        <div class="button-grid">
          <button id="checkButton" type="button">npm run check</button>
          <button id="buildButton" type="button">npm run build</button>
          <a id="previewLink" class="button secondary disabled" href="#" target="_blank" rel="noopener noreferrer">Astro 미리보기</a>
          <button id="gitButton" type="button" disabled>브랜치·Draft PR 준비</button>
        </div>
        <pre id="output" class="output">실행 결과가 여기에 표시됩니다.</pre>
      </section>
    </main>

    <script src="/assets/app.js" type="module"></script>
  </body>
</html>
